<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Heal-Delight</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f766e, #0284c7);
      color: #fff;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .card {
      width: min(760px, 92vw);
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 14px;
      padding: 24px;
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 8px 0;
    }
    p {
      margin: 8px 0;
      line-height: 1.5;
    }
    a {
      color: #a7f3d0;
      font-weight: 700;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Heal-Delight</h1>
    <p>This GitHub Pages URL is now active.</p>
    <p>This project is a Django app, so full dynamic features (login, cart, admin, database) require a Python server deployment.</p>
    <p>Repository: <a href="https://github.com/showman-patil/heal" target="_blank" rel="noopener">github.com/showman-patil/heal</a></p>
  </main>
</body>
</html>
