{% extends 'base.html' %}

{% block title %}Reset Password | Heal-Delight{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-r from-green-400 to-blue-500 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden">
        <div class="bg-gradient-to-r from-green-600 to-blue-600 px-6 py-8 text-white text-center">
            <h1 class="text-3xl font-bold">Reset Password</h1>
            <p class="text-green-100 mt-2">Enter your registered email</p>
        </div>
        <div class="px-6 py-8">
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Email</label>
                    <input type="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Enter your email">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-green-600 to-green-700 text-white font-bold py-3 rounded-lg hover:shadow-lg transition">
                    Send Reset Link
                </button>
            </form>
            <p class="mt-4 text-center text-sm text-gray-600">
                <a href="{% url 'login' %}" class="text-green-600 font-bold hover:underline">Back to login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
