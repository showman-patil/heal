{% extends 'base.html' %}

{% block title %}Email Sent | Heal-Delight{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-r from-green-400 to-blue-500 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden">
        <div class="bg-gradient-to-r from-green-600 to-blue-600 px-6 py-8 text-white text-center">
            <h1 class="text-3xl font-bold">Check Your Email</h1>
        </div>
        <div class="px-6 py-8 text-center">
            <p class="text-gray-700">If an account exists with that email, we sent a password reset link.</p>
            <p class="mt-4 text-sm text-gray-600">Check your terminal/email backend output if you are using development mode.</p>
            <a href="{% url 'login' %}" class="inline-block mt-6 text-green-600 font-bold hover:underline">Back to login</a>
        </div>
    </div>
</div>
{% endblock %}
