{% extends 'base.html' %}

{% block title %}Password Updated | Heal-Delight{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-r from-green-400 to-blue-500 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden">
        <div class="bg-gradient-to-r from-green-600 to-blue-600 px-6 py-8 text-white text-center">
            <h1 class="text-3xl font-bold">Password Updated</h1>
        </div>
        <div class="px-6 py-8 text-center">
            <p class="text-gray-700">Your password has been reset successfully.</p>
            <a href="{% url 'login' %}" class="inline-block mt-6 bg-gradient-to-r from-green-600 to-green-700 text-white font-bold px-6 py-2 rounded-lg hover:shadow-lg transition">
                Login Now
            </a>
        </div>
    </div>
</div>
{% endblock %}
